<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Cloudinary Image Upload Preview</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f9f9f9;
    }

    input[type="file"] {
      margin-bottom: 20px;
    }

    img {
      display: block;
      margin-top: 20px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .url-output {
      margin-top: 10px;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <h2>Upload Image to Cloudinary and Preview</h2>
  <input type="file" id="imageInput" accept="image/*" />
  <div class="url-output" id="cdnUrl"></div>
  <img id="previewImage" src="" alt="" />

  <script>
    const imageInput = document.getElementById("imageInput");
    const previewImage = document.getElementById("previewImage");
    const cdnUrl = document.getElementById("cdnUrl");

    imageInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "Festofy"); // Replace with your unsigned preset name

      try {
        const response = await fetch("  ", {
          method: "POST",
          body: formData,
        });

        const data = await response.json();

        if (data.secure_url) {
          cdnUrl.innerHTML = `<strong>CDN URL:</strong> <a href="${data.secure_url}" target="_blank">${data.secure_url}</a>`;
          previewImage.src = data.secure_url;
        } else {
          cdnUrl.innerText = "Upload failed: " + JSON.stringify(data);
        }
      } catch (err) {
        console.error("Upload failed:", err);
        cdnUrl.innerText = "Upload failed. Check console.";
      }
    });
  </script>

</body>

</html>
